site_name: Figma and FigJam User Guide
site_url: https://sitename.example

theme:
  name: material
  palette:
    - scheme: slate
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
      primary: deep purple
      accent: pink

    - scheme: default
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
      primary: deep purple
      accent: pink
  features:
    - navigation.footer
    - navigation.top
    - content.code.copy
    - search.suggest
    - search.highlight

nav:
  - Home: index.md
  - Tasks:
      - Set up Figma and create your first file: tasks/figma-setup.md
      - Create your first flowchart in FigJam: tasks/first-flowchart-figjam.md
      - Create your first wireframe in Figma Design: tasks/first-wireframe-figma-design.md
      - Share your file and collaborate with teammates: tasks/collaborate-with-teammates.md
  - Glossary: glossary.md
  - Troubleshooting: troubleshooting.md

markdown_extensions:
  - attr_list
  - admonition
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
